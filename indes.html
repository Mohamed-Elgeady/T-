<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عاوز بوسه</title>
<link rel="stylesheet" href="css.css">
</head>
<body>

  <div id="questionContainer" class="container">
    <h1>💖؟هل هتديني بوسه 💖</h1>
    <div class="buttons">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>
  </div>

  <div id="heartLoader" class="loader" style="display:none;">
    <div class="heart"></div>
    <p>Loading love...</p>
  </div>

  <div id="resultContainer" class="result" style="display:none;">
    <img id="gifResult" src="bear kiss GIF.gif" alt="Valentine gif">
    <h1>كنت متاكد انك هتوافقي😍!</h1>
    <p>خدي بوسه انت كمان ❤️</p>
  </div>

  <script src="js.js"></script>
</body>
</html>
